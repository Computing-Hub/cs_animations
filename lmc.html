<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Little Man Computer — assembly editor &amp; simulator</title>
<style>
  :root{ --bg:#05060c; --panel:#0c1020; --edge:#1d2540; --txt:#cfe6ff;
    --acc:#16f0ff; --pc:#ffb02e; --out:#19ff9b; --err:#ff5d8f; --used:#2f6df0; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 48px}
  a.back{color:#7d93bd;text-decoration:none;font-size:12px}
  a.back:hover{color:var(--acc)}
  h1{margin:8px 0 2px;font-size:clamp(20px,4vw,30px);letter-spacing:.1em;
    background:linear-gradient(90deg,var(--acc),var(--out));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{margin:4px 0 16px;color:#8aa0c8;font-size:13px}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:820px){ .layout{grid-template-columns:1fr} }
  .panel{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:14px}
  textarea{width:100%;height:280px;font:13px/1.5 ui-monospace,monospace;color:#cfe6ff;background:#070b16;
    border:1px solid var(--edge);border-radius:8px;padding:10px;resize:vertical}
  label{font-size:12px;color:#8aa0c8;display:block;margin:10px 0 4px}
  input[type=text]{width:100%;font:inherit;color:var(--txt);background:#070b16;
    border:1px solid var(--edge);border-radius:8px;padding:8px 10px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
  button{font:inherit;color:var(--txt);background:#0a0f1c;border:1px solid var(--edge);
    border-radius:8px;padding:8px 12px;cursor:pointer} button:hover{border-color:var(--acc);color:#fff}
  input[type=range]{accent-color:var(--acc)}
  .regs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .reg{background:#0a0f1c;border:1px solid var(--edge);border-radius:8px;padding:8px 12px;min-width:84px}
  .reg .k{font-size:10px;color:#7d93bd;letter-spacing:.1em} .reg .v{font-size:20px;color:#fff}
  .mem{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
  .cell{background:#0a0f1c;border:1px solid #1a2336;border-radius:4px;padding:3px 2px;text-align:center;font-size:10px}
  .cell .a{color:#566} .cell .v{color:#9fb4d8;font-size:12px}
  .cell.used .v{color:#bff8ff}
  .cell.pc{border-color:var(--pc);box-shadow:0 0 10px rgba(255,176,46,.4)} .cell.pc .v{color:var(--pc)}
  .cell.touch{border-color:var(--acc)}
  .out{font-size:16px;color:var(--out);min-height:22px;word-break:break-all}
  .msg{margin-top:8px;font-size:12px;color:#8aa0c8;white-space:pre-wrap}
  .msg.err{color:var(--err)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← all animations</a>
  <h1>LITTLE MAN COMPUTER</h1>
  <p class="sub">Write assembly, assemble it into numeric mailboxes, and run it through the fetch-decode-execute cycle one instruction at a time.</p>

  <div class="layout">
    <div class="panel">
      <strong style="font-size:12px;color:#9fb4d8;letter-spacing:.1em">PROGRAM</strong>
      <textarea id="code"></textarea>
      <label>Inputs (used by INP, space or comma separated)</label>
      <input id="inputs" type="text" value="7 5" />
      <div class="controls">
        <button id="assemble">⚙ Assemble</button>
        <button id="run">▶ Run</button>
        <button id="step">⏭ Step</button>
        <button id="reset">↺ Reset</button>
        <label style="margin:0">Speed <input id="speed" type="range" min="1" max="30" value="6" /></label>
      </div>
      <div class="msg" id="msg">Click Assemble to load the program.</div>
    </div>

    <div class="panel">
      <div class="regs">
        <div class="reg"><div class="k">ACC</div><div class="v" id="acc">0</div></div>
        <div class="reg"><div class="k">PC</div><div class="v" id="pc">0</div></div>
        <div class="reg"><div class="k">INSTRUCTION</div><div class="v" id="ir" style="font-size:14px">–</div></div>
      </div>
      <label style="margin-top:0">Output</label>
      <div class="out" id="output"></div>
      <label>Memory (mailboxes 0–99)</label>
      <div class="mem" id="mem"></div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const DEFAULT=
`// Adds two input numbers and outputs the sum
        INP
        STA first
        INP
        ADD first
        OUT
        HLT
first   DAT`;
  $('code').value=DEFAULT;

  const OPS={ADD:1,SUB:2,STA:3,LDA:5,BRA:6,BRZ:7,BRP:8};
  const MNEM={INP:1,OUT:1}; // handled specially
  const KNOWN=new Set(['ADD','SUB','STA','LDA','BRA','BRZ','BRP','INP','OUT','HLT','DAT']);

  let mem=new Array(100).fill(0), used=new Array(100).fill(false);
  let acc=0, pc=0, halted=true, irText='–', outputs=[], inputQ=[], touch=-1;
  let running=false, acc_t=0, speed=6;

  function assemble(){
    const lines=$('code').value.split('\n');
    const labels={}, items=[]; const errors=[];
    let addr=0;
    // pass 1: addresses + labels
    lines.forEach((raw,li)=>{
      let line=raw.replace(/(\/\/|;|#).*$/,'').trim();
      if(!line) return;
      let tok=line.split(/\s+/);
      let label=null, mnem, operand=null;
      if(!KNOWN.has(tok[0].toUpperCase())){ label=tok[0]; tok=tok.slice(1); }
      if(tok.length===0){ errors.push('line '+(li+1)+': label with no instruction'); return; }
      mnem=tok[0].toUpperCase();
      if(!KNOWN.has(mnem)){ errors.push('line '+(li+1)+': unknown mnemonic "'+tok[0]+'"'); return; }
      operand = tok[1]!==undefined? tok[1] : null;
      if(addr>99){ errors.push('line '+(li+1)+': program exceeds 100 mailboxes'); return; }
      if(label){ if(labels[label]!==undefined) errors.push('line '+(li+1)+': duplicate label "'+label+'"'); labels[label]=addr; }
      items.push({li,mnem,operand,addr}); addr++;
    });
    // pass 2: encode
    const m=new Array(100).fill(0), u=new Array(100).fill(false);
    items.forEach(it=>{
      let code=0;
      const resolve=op=>{ if(op==null) return null;
        if(/^-?\d+$/.test(op)) return parseInt(op,10);
        if(labels[op]!==undefined) return labels[op];
        errors.push('line '+(it.li+1)+': unknown label "'+op+'"'); return 0; };
      if(it.mnem==='HLT'){ code=0; }
      else if(it.mnem==='INP'){ code=901; }
      else if(it.mnem==='OUT'){ code=902; }
      else if(it.mnem==='DAT'){ const v=it.operand!=null?resolve(it.operand):0; code=((v%1000)+1000)%1000; }
      else { const a=resolve(it.operand);
        if(a==null){ errors.push('line '+(it.li+1)+': '+it.mnem+' needs an operand'); }
        else if(a<0||a>99){ errors.push('line '+(it.li+1)+': operand '+a+' out of range 0–99'); }
        code=OPS[it.mnem]*100 + (((a||0)%100+100)%100);
      }
      m[it.addr]=code; u[it.addr]=true;
    });
    if(errors.length){ setMsg(errors.join('\n'),true); return false; }
    mem=m; used=u; reset(true);
    setMsg('Assembled '+items.length+' lines. Ready to run.',false);
    return true;
  }

  function reset(keepMem){
    acc=0; pc=0; halted=false; irText='–'; outputs=[]; touch=-1; running=false; acc_t=0;
    inputQ=$('inputs').value.split(/[\s,]+/).filter(s=>s.length).map(Number);
    $('run').textContent='▶ Run';
    render();
  }

  function decodeText(instr){
    const op=Math.floor(instr/100), x=instr%100;
    if(instr===0) return 'HLT';
    if(instr===901) return 'INP';
    if(instr===902) return 'OUT';
    const names={1:'ADD',2:'SUB',3:'STA',5:'LDA',6:'BRA',7:'BRZ',8:'BRP'};
    return (names[op]||'DAT')+' '+x;
  }

  function stepCPU(){
    if(halted) return false;
    if(pc<0||pc>99){ halted=true; setMsg('PC out of range — halted.',true); return false; }
    const instr=mem[pc]; const op=Math.floor(instr/100), x=instr%100;
    irText=decodeText(instr); touch=-1;
    let next=(pc+1)%100;
    if(instr===0){ halted=true; setMsg('Program halted (HLT).',false); render(); return false; }
    else if(instr===901){ if(inputQ.length){ acc=inputQ.shift(); } else { setMsg('INP but no more inputs — using 0.',true); acc=0; } }
    else if(instr===902){ outputs.push(acc); }
    else if(op===1){ acc=acc+mem[x]; touch=x; }
    else if(op===2){ acc=acc-mem[x]; touch=x; }
    else if(op===3){ mem[x]=((acc%1000)+1000)%1000; used[x]=true; touch=x; }
    else if(op===5){ acc=mem[x]; touch=x; }
    else if(op===6){ next=x; }
    else if(op===7){ if(acc===0) next=x; }
    else if(op===8){ if(acc>=0) next=x; }
    else { halted=true; setMsg('Unknown opcode at mailbox '+pc+' — halted.',true); render(); return false; }
    pc=next; render();
    return true;
  }

  function buildMem(){
    const g=$('mem'); g.innerHTML='';
    for(let i=0;i<100;i++){
      const c=document.createElement('div'); c.className='cell'+(used[i]?' used':'');
      c.id='cell'+i;
      c.innerHTML='<div class="a">'+i+'</div><div class="v">'+String(mem[i]).padStart(3,'0')+'</div>';
      g.appendChild(c);
    }
  }
  function render(){
    $('acc').textContent=acc;
    $('pc').textContent=pc;
    $('ir').textContent=irText;
    $('output').textContent=outputs.join('   ');
    for(let i=0;i<100;i++){
      const c=$('cell'+i); if(!c) continue;
      c.className='cell'+(used[i]?' used':'')+(i===pc&&!halted?' pc':'')+(i===touch?' touch':'');
      c.querySelector('.v').textContent=String(mem[i]).padStart(3,'0');
    }
  }
  function setMsg(s,err){ const m=$('msg'); m.textContent=s; m.className='msg'+(err?' err':''); }

  let last=performance.now();
  function frame(now){ const dt=(now-last)/1000; last=now;
    if(running && !halted){ acc_t+=dt*speed; let g=0;
      while(acc_t>=1 && !halted && g<5000){ acc_t-=1; if(!stepCPU()){ running=false; $('run').textContent='▶ Run'; } g++; }
    }
    requestAnimationFrame(frame);
  }

  $('assemble').addEventListener('click',()=>{ if(assemble()){ buildMem(); render(); } });
  $('run').addEventListener('click',()=>{ if(halted){ reset(true); } running=!running;
    $('run').textContent=running?'⏸ Pause':'▶ Run'; });
  $('step').addEventListener('click',()=>{ running=false; $('run').textContent='▶ Run'; stepCPU(); });
  $('reset').addEventListener('click',()=>{ reset(true); setMsg('Reset — ACC, PC and output cleared.',false); });
  $('speed').addEventListener('input',e=>{ speed=parseInt(e.target.value,10); });

  // initial assemble
  if(assemble()){ buildMem(); render(); }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
